<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ludo Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

h1{
margin:10px;
}

.board{
width:600px;
height:600px;
margin:auto;
display:grid;
grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);
border:3px solid black;
}

.cell{
border:1px solid #ddd;
position:relative;
}

.blue{background:#4da6ff;}
.red{background:#ff6666;}
.green{background:#66cc66;}
.yellow{background:#ffd24d;}

.token{
width:22px;
height:22px;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.token.blue{background:blue;}
.token.red{background:red;}

.controls{
margin:20px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Ludo Game</h1>

<div class="board" id="board"></div>

<div class="controls">
<button onclick="rollDice()">Roll Dice</button>
<h2 id="dice">Dice: -</h2>
<h3 id="turn">Turn: Blue</h3>
</div>

<script>

const board=document.getElementById("board");
const size=15;

/* create board */

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

let cell=document.createElement("div");
cell.className="cell";

if(r<6 && c<6) cell.classList.add("blue");
if(r>8 && c>8) cell.classList.add("red");
if(r<6 && c>8) cell.classList.add("green");
if(r>8 && c<6) cell.classList.add("yellow");

board.appendChild(cell);

}
}

/* path around board */

const path=[
6,7,8,23,38,53,68,83,98,113,128,127,126,125,124,123,
122,121,120,105,90,75,60,45,30,15,0,1,2,3,4,5,20,35,
50,65,80,95,110,111,112
];

/* tokens */

let bluePos=0;
let redPos=0;

let blue=document.createElement("div");
blue.className="token blue";

let red=document.createElement("div");
red.className="token red";

board.children[path[0]].appendChild(blue);
board.children[path[20]].appendChild(red);

/* game state */

let turn="blue";

/* dice */

function rollDice(){

let dice=Math.floor(Math.random()*6)+1;

document.getElementById("dice").innerText="Dice: "+dice;

moveToken(dice);

}

/* movement */

function moveToken(steps){

if(turn==="blue"){

bluePos+=steps;

if(bluePos>=path.length) bluePos=path.length-1;

board.children[path[bluePos]].appendChild(blue);

turn="red";

}

else{

redPos+=steps;

if(redPos>=path.length) redPos=path.length-1;

board.children[path[redPos]].appendChild(red);

turn="blue";

}

document.getElementById("turn").innerText="Turn: "+turn;

}

</script>

</body>
</html>
